<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watcher</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial,sans-serif;
background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1920&auto=format&fit=crop')
center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.content{
text-align:center;
color:white;
}

h1{
font-size:80px;
letter-spacing:10px;
text-shadow:0 0 20px rgba(255,255,255,0.5);
margin-bottom:20px;
}

p{
font-size:22px;
margin-bottom:30px;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>
<body>

<div class="content">
<h1>THE WATCHER</h1>
<p>Hide. Survive. Escape.</p>
<button onclick="alert('Coming Soon')">PLAY NOW</button>
</div>

</body>
</html>
