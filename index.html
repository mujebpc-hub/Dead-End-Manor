<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME MENU -->
<div id="menu">
  <h1>THE WATCHER</h1>
  <p>Hide. Survive. Escape.</p>
  <button onclick="startGame()">PLAY NOW</button>
</div>

<!-- LOADING -->
<div id="loading">
  <h2>Entering The Facility...</h2>
  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<!-- MAIN MENU -->
<div id="mainMenu">
  <h1>THE WATCHER</h1>

  <button onclick="newGame()">NEW GAME</button><br><br>
  <button onclick="alert('Settings Coming Soon')">SETTINGS</button><br><br>
  <button onclick="alert('Created By You')">CREDITS</button>
</div>

<!-- GAME SCREEN -->
<div id="game"></div>

<script src="game.js"></script>
</body>
</html>
