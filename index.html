<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE WATCHER</title>

  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #home,
    #menu,
    #loading,
    #gameOver,
    #victory {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
      color: #fff;
      z-index: 50;
      text-align: center;
      padding: 24px;
    }

    #loading,
    #menu,
    #gameOver,
    #victory {
      display: none;
    }

    h1 {
      font-size: 46px;
      letter-spacing: 4px;
      margin: 0 0 20px;
      color: #f2f2f2;
      text-shadow: 0 0 18px rgba(180, 0, 0, 0.8);
    }

    h2 {
      font-size: 28px;
      margin: 0 0 18px;
      letter-spacing: 2px;
    }

    p {
      max-width: 520px;
      margin: 0 0 18px;
      color: #bdbdbd;
      line-height: 1.5;
    }

    button {
      min-width: 160px;
      padding: 12px 24px;
      margin-top: 10px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      background: #850000;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #b30000;
    }

    #gameUI {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      display: none;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 2px 4px #000;
    }

    #healthBox {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 18px;
    }

    #healthBar,
    #staminaBar {
      width: 180px;
      height: 16px;
      margin-top: 6px;
      border: 2px solid #fff;
      background: rgba(255, 255, 255, 0.15);
    }

    #healthFill {
      width: 100%;
      height: 100%;
      background: #d00000;
    }

    #staminaBox {
      position: absolute;
      top: 72px;
      left: 16px;
      font-size: 16px;
    }

    #staminaFill {
      width: 100%;
      height: 100%;
      background: #e0b000;
    }

    #objectiveText {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      text-align: center;
      max-width: 60%;
    }

    #interactionText {
      position: absolute;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      font-size: 18px;
      text-align: center;
    }

    #torchIndicator {
      position: absolute;
      top: 116px;
      left: 16px;
      font-size: 16px;
    }

    #pauseBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      pointer-events: auto;
      width: 54px;
      height: 54px;
      min-width: 54px;
      padding: 0;
      border-radius: 50%;
      font-size: 15px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #fff;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 34px;
      line-height: 1;
      color: #fff;
    }

    #mobileControls {
      position: absolute;
      right: 22px;
      bottom: 165px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    #torchBtn,
    #runBtn {
      width: 98px;
      height: 46px;
      min-width: 98px;
      padding: 0;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      border: 2px solid #fff;
      font-size: 15px;
    }

    #gameOver h1 {
      color: #c90000;
    }

    #victory h1 {
      color: #f1f1f1;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      h2 {
        font-size: 22px;
      }

      button {
        min-width: 145px;
        font-size: 14px;
      }

      #healthBox,
      #staminaBox,
      #torchIndicator {
        font-size: 14px;
      }

      #healthBar,
      #staminaBar {
        width: 135px;
        height: 14px;
      }

      #objectiveText {
        top: 74px;
        font-size: 14px;
        max-width: 88%;
      }

      #pauseBtn {
        width: 44px;
        height: 44px;
        min-width: 44px;
        font-size: 13px;
      }

      #mobileControls {
        right: 18px;
        bottom: 160px;
      }

      #torchBtn,
      #runBtn {
        width: 86px;
        min-width: 86px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div id="home">
    <h1>THE WATCHER</h1>
    <p>Survive the night. Find the mansion. Escape before The Watcher finds you.</p>
    <button onclick="startGame()">START</button>
    <button type="button">SETTINGS</button>
    <button type="button">CREDITS</button>
  </div>

  <div id="loading">
    <h2>Loading The Watcher...</h2>
  </div>

  <div id="menu">
    <h1>THE WATCHER</h1>
    <button onclick="enterGame()">ENTER GAME</button>
  </div>

  <div id="gameUI">
    <div id="healthBox">
      Health: <span id="healthValue">100</span>
      <div id="healthBar">
        <div id="healthFill"></div>
      </div>
    </div>

    <div id="staminaBox">
      Stamina
      <div id="staminaBar">
        <div id="staminaFill"></div>
      </div>
    </div>

    <div id="torchIndicator">Torch: OFF</div>
    <div id="objectiveText">Find the Mansion Key</div>
    <div id="interactionText">Press E</div>

    <button id="pauseBtn" onclick="togglePause()">Pause</button>

    <div id="crosshair">+</div>

    <div id="mobileControls">
      <button id="torchBtn" onclick="toggleTorch()">Torch</button>
      <button id="runBtn">Run</button>
    </div>
  </div>

  <div id="gameOver">
    <h1>YOU DIED</h1>
    <button onclick="restartGame()">RETRY</button>
    <button onclick="backToMenu()">MAIN MENU</button>
  </div>

  <div id="victory">
    <h1>YOU ESCAPED</h1>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script src="game.js"></script>

</body>
</html>
