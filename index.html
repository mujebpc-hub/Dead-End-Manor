<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>The Mansion Horror Game</title>
  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }

    #home, #menu, #loading {
      position:absolute;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:black;
      color:white;
    }

    button {
      padding:10px 20px;
      margin-top:10px;
      cursor:pointer;
    }

    #loading { display:none; }
    #menu { display:none; }
  </style>
</head>
<body>

<div id="home">
  <h1>THE WATCHER</h1>
  <button onclick="startGame()">PLAY NOW</button>
</div>

<div id="loading">
  <h2>LOADING...</h2>
</div>

<div id="menu">
  <h2>MAIN MENU</h2>
  <button onclick="enterGame()">ENTER GAME</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
