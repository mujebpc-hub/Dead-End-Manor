<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watcher</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

#menu{
text-align:center;
}

h1{
font-size:70px;
margin-bottom:15px;
}

button{
padding:15px 40px;
font-size:22px;
cursor:pointer;
border:none;
border-radius:8px;
}

#loading{
display:none;
text-align:center;
width:80%;
max-width:500px;
}

.bar{
width:100%;
height:25px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress{
width:0%;
height:100%;
background:white;
}
</style>

</head>

<body>

<div id="menu">
<h1>THE WATCHER</h1>
<p>Hide. Survive. Escape.</p>
<br>
<button onclick="startGame()">PLAY NOW</button>
</div>

<div id="loading">
<h2>Entering The Facility...</h2>

<div class="bar">
<div class="progress" id="progress"></div>
</div>
</div>

<script>

function startGame(){

document.getElementById("menu").style.display="none";
document.getElementById("loading").style.display="block";

let progress=0;

let interval=setInterval(()=>{

progress+=2;

document.getElementById("progress").style.width=progress+"%";

if(progress>=100){

clearInterval(interval);

setTimeout(()=>{
alert("Game Coming Soon");
},500);

}

},60);

}

</script>

</body>
</html>
